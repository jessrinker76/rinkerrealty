<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Rinker Realty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--stone:#c9c4be;--espresso:#120d09;--cream:#fffffe;--gray:#737373;--warm:#a0836a;--gold:#b8986e;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--espresso);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:3rem;opacity:0.7;}
.logo span{font-style:italic;color:var(--stone);}
.check{font-size:4rem;margin-bottom:1.5rem;animation:pop 0.5s ease;}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;margin-bottom:1rem;line-height:1.1;}
h1 em{font-style:italic;color:var(--stone);}
p{font-size:0.97rem;color:var(--gray);line-height:1.75;max-width:460px;margin:0 auto 2.5rem;}
.btn{display:inline-block;background:var(--warm);color:var(--cream);text-decoration:none;padding:0.9rem 2.2rem;font-size:0.83rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;border-radius:2px;transition:background 0.2s;}
.btn:hover{background:var(--gold);}
.contact{margin-top:1.8rem;font-size:0.84rem;color:var(--gray);}
.contact a{color:var(--stone);text-decoration:none;}
.divider{width:40px;height:1px;background:rgba(201,196,190,0.3);margin:2.5rem auto;}
</style>
</head>
<body>
  <div class="logo">Rinker <span>Realty</span></div>
  <div class="check">✅</div>
  <h1>You're All Set.<br><em>We'll Be in Touch.</em></h1>
  <p>Thank you for reaching out! Jessica will personally review your information and get back to you within 24 hours. In the meantime, feel free to call or text directly.</p>
  <a href="https://jessrinker76.github.io/rinkerrealty/" class="btn">← Back to Home</a>
  <div class="divider"></div>
  <div class="contact">Or call Jessica directly: <a href="tel:5095392945">(509) 539-2945</a></div>
</body>
</html>
